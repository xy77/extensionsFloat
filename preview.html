<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在准备预览</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f6f7fb;
      color: #202124;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #preview-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    #preview-status {
      display: grid;
      place-items: center;
      box-sizing: border-box;
      margin: 0;
      padding: 24px;
      width: 100%;
      height: 100%;
      color: #5f6368;
      background: #f6f7fb;
      white-space: pre-wrap;
      word-break: break-word;
      font: 14px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.has-preview #preview-status {
      display: none;
    }

    body.has-error #preview-frame {
      display: none;
    }

    body.has-error #preview-status {
      display: block;
      overflow: auto;
      color: #7f1d1d;
      background: #fff5f5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <iframe id="preview-frame" title="预览内容" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-downloads"></iframe>
  <pre id="preview-status">正在等待预览数据...</pre>
  <script src="preview.js"></script>
</body>
</html>
